name: Continuous Fuzz
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: macos-15
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        fuzzer: [imageio_fuzzer, aiff_escalation_fuzzer, pdf_fuzzer, transcoder_fuzzer]
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzer
        run: |
          cd ${{ matrix.fuzzer }}
          chmod +x build.sh
          ./build.sh
      - name: Run fuzzer (5 hours)
        run: |
          cd ${{ matrix.fuzzer }}
          FUZZER=$(find . -maxdepth 1 -type f -perm +111 -name "fuzz_*" | head -1)
          if [ -z "$FUZZER" ]; then echo "No fuzzer binary found"; exit 1; fi
          CORPUS=$(find . -name "corpus" -type d | head -1)
          [ -z "$CORPUS" ] && CORPUS="corpus" && mkdir -p corpus
          echo "Running: $FUZZER $CORPUS/"
          $FUZZER "$CORPUS/" -max_total_time=18000 || true
      - name: Check for crashes
        if: always()
        run: |
          cd ${{ matrix.fuzzer }}
          if ls crashes/crash-* 1>/dev/null 2>&1; then
            echo "CRASHES FOUND!"
            ls -la crashes/
          else
            echo "No crashes found"
          fi
      - name: Upload crashes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crashes-${{ matrix.fuzzer }}-${{ github.run_number }}
          path: ${{ matrix.fuzzer }}/crashes/
          retention-days: 90
          if-no-files-found: ignore
